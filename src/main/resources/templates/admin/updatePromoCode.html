<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обновление промокода - RoleMaster</title>
    <style>
        .reward-block {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .reward-block label {
            display: inline-block;
            width: 80px;
            margin-bottom: 5px;
        }
        .reward-block input {
            margin-bottom: 10px;
            padding: 5px;
            width: 200px;
        }
        .reward-block button {
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .reward-block button:hover {
            background-color: #45a049;
        }
        #container-reward h2 {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        form#updatePromoCode {
            display: flex;
            flex-direction: column;
            max-width: 400px;
        }
        form#updatePromoCode label {
            margin-top: 10px;
        }
        form#updatePromoCode button {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="welcome-message"></div>
    <h1>Обновление промокода</h1>
    <form id="updatePromoCode">
        <label>Промокод: </label>
        <input type="text" id="promo-code">

        <label>Количество использований: </label>
        <input type="number" id="count">

        <label>Срок действия: </label>
        <input type="datetime-local" id="expiration-date">

        <label>Тип промокода: </label>
        <select id="type">
            <option value="-">-</option>
            <option value="MONEY">Сумма</option>
            <option value="PAGE">Страница</option>
            <option value="ROLE">Роль</option>
        </select>

        <label>Статус промокода: </label>
        <select id="status">
            <option value="-">-</option>
            <option value="AVAILABLE">Доступен</option>
            <option value="CLOSED">Закрыт</option>
            <option value="ARCHIVED">Архивирован</option>
        </select>

        <button type="submit">Обновить промокод</button>
    </form>
    <div id="answer-message"></div>
    <div id="container-reward"></div>
    <div id="answer-reward"></div>
    <script th:src="@{/js/admin/updatePromoCode.js}"></script>
</body>
</html>
